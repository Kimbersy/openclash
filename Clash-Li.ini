;3、节点组

; ====== 通用“特殊计费/倍率”关键词 ======
; 覆盖：x、×、倍、倍率、计费、流量计费、特殊连接、特殊连接优化

; ====== 通用“游戏专用”关键词 ======
; 这里只抓“游戏专用”节点，不把普通低延迟节点一起排掉
; 覆盖：游戏 / Game / Gaming / 联机 / 主机 / 电竞 / PSN / PlayStation / Xbox / Nintendo / Switch

; ====== 通用“低延迟”关键词 ======
; 这里只抓通用低延迟标签，不抓游戏专用
; 覆盖：低延迟 / 低延時 / Low Latency / Low Delay / low ping / 低Ping

; ====== 通用“高带宽”关键词 ======
; 覆盖：高带宽 / 大带宽 / High Bandwidth / 带宽优化 / 流媒体专线 / 影音专线 / Streaming

